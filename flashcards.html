<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N5 Flashcards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A3C5E;--mid:#2E75B6;--light:#DCE9F7;
  --gold:#c8a84b;--green:#1A5C2E;
  --red:#CC2200;--white:#fff;--bg:#0f1923;
  --card-bg:#1a2535;--border:#2a3f5a;
  --text:#e8edf2;--muted:#8899aa;
}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:linear-gradient(135deg,#0d1e30,#1A3C5E);padding:16px 20px;border-bottom:2px solid var(--gold);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header h1{font-size:1.4rem;color:#fff}
.header h1 span{color:var(--gold)}
.back-btn{background:rgba(200,168,75,.15);border:1px solid var(--gold);color:var(--gold);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;text-decoration:none;white-space:nowrap}
.back-btn:hover{background:rgba(200,168,75,.3)}

.tabs{display:flex;background:#111d2b;border-bottom:2px solid var(--border);overflow-x:auto}
.tab{padding:13px 20px;cursor:pointer;font-size:.95rem;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;user-select:none;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--text)}

.controls{padding:14px 20px;background:#111d2b;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,button{padding:8px 12px;border-radius:7px;font-size:.88rem;cursor:pointer;border:1px solid var(--border)}
select{background:var(--card-bg);color:var(--text);max-width:100%}
.btn{background:var(--mid);color:#fff;border-color:var(--mid);font-weight:bold}
.btn:hover{background:#1e5a9a}
.btn-gold{background:var(--gold);color:#111;border-color:var(--gold)}
.btn-gold:hover{background:#b89630}
.btn-outline{background:transparent;color:var(--text)}
.btn-outline:hover{background:rgba(255,255,255,.06)}
.count-badge{background:var(--navy);color:var(--gold);border:1px solid var(--gold);padding:6px 12px;border-radius:20px;font-size:.82rem;font-weight:bold;white-space:nowrap}

.panel{display:none;padding:20px}
.panel.active{display:block}

/* ── FLASHCARD ── */
.fc-area{max-width:560px;margin:0 auto}
.progress-bar-wrap{background:var(--border);border-radius:99px;height:5px;margin-bottom:16px}
.progress-bar{background:var(--gold);height:5px;border-radius:99px;transition:width .3s}
.progress-text{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:16px}

.flip-wrap{perspective:1000px;height:260px;cursor:pointer;margin-bottom:16px}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s ease;border-radius:14px}
.flip-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
.fc-front{background:linear-gradient(135deg,#1a2f4a,#0f1e30);border:2px solid var(--mid)}
.fc-back{background:linear-gradient(135deg,#1a3020,#0f1e18);border:2px solid #2e7d4f;transform:rotateY(180deg)}
.fc-word{font-size:3.2rem;font-weight:bold;color:#fff;line-height:1.1;margin-bottom:8px}
.fc-kana{font-size:1.2rem;color:#aaccee;margin-bottom:4px}
.fc-romaji{font-size:.95rem;color:var(--muted);font-style:italic}
.fc-pos{font-size:.72rem;color:var(--gold);margin-top:6px}
.fc-hint{font-size:.82rem;color:var(--muted);margin-top:14px}
.fc-meaning{font-size:1.9rem;font-weight:bold;color:#7de89a;margin-bottom:10px}
.fc-lesson{font-size:.72rem;color:var(--muted)}
.kj-word{font-size:5rem;font-weight:bold;color:#fff}
.kj-stroke{font-size:.82rem;color:var(--muted);margin-top:4px}
.kj-on{font-size:1rem;color:#ff9966;margin-bottom:3px}
.kj-kun{font-size:1rem;color:#66ccff;margin-bottom:5px}
.kj-meaning{font-size:1.7rem;font-weight:bold;color:#7de89a}

.fc-actions{display:flex;gap:12px;justify-content:center;margin-bottom:14px}
.btn-wrong{background:#5c1a1a;color:#ff8080;border:1.5px solid #cc3333;padding:11px 26px;border-radius:10px;font-size:.95rem;font-weight:bold;cursor:pointer}
.btn-right{background:#1a4a2a;color:#80ff9a;border:1.5px solid #33cc55;padding:11px 26px;border-radius:10px;font-size:.95rem;font-weight:bold;cursor:pointer}
.btn-wrong:hover{background:#7a2020}
.btn-right:hover{background:#1f6035}
.fc-nav{display:flex;gap:10px;justify-content:center}

.summary{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:28px;text-align:center;max-width:480px;margin:0 auto}
.summary h2{font-size:1.7rem;color:var(--gold);margin-bottom:6px}
.score-ring{font-size:3.5rem;margin:12px 0}
.score-stats{display:flex;gap:20px;justify-content:center;margin:16px 0}
.stat-box{background:#111d2b;border-radius:10px;padding:12px 18px;min-width:72px}
.stat-num{font-size:1.8rem;font-weight:bold}
.stat-lbl{font-size:.72rem;color:var(--muted);margin-top:3px}
.wrong-list{text-align:left;margin-top:18px;max-height:180px;overflow-y:auto}
.wrong-item{padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:baseline}
.wrong-jp{font-size:1.1rem;color:#fff;min-width:55px}
.wrong-en{font-size:.85rem;color:var(--muted)}

/* ── MATCHING ── */
.match-header{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.timer{font-size:1.4rem;font-weight:bold;color:var(--gold);min-width:50px}
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px}
.match-card{background:var(--card-bg);border:2px solid var(--border);border-radius:10px;padding:13px 9px;text-align:center;cursor:pointer;min-height:68px;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;flex-direction:column;gap:3px}
.match-card:hover{border-color:var(--mid);background:#1f3048}
.match-card.selected{border-color:var(--gold);background:#2a3518;box-shadow:0 0 10px rgba(200,168,75,.4)}
.match-card.matched{border-color:#33cc55;background:#0f2518;opacity:.45;cursor:default;pointer-events:none}
.match-card.wrong{border-color:#cc3333;background:#2a0f0f;animation:shake .3s}
.match-card .jp{font-size:1.3rem;color:#fff}
.match-card .en{font-size:.78rem;color:var(--muted)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.match-complete{text-align:center;padding:36px 20px;background:var(--card-bg);border-radius:14px;border:1px solid var(--border);max-width:380px;margin:0 auto}
.match-complete h2{font-size:1.9rem;color:var(--gold);margin-bottom:10px}
.big-time{font-size:3.2rem;font-weight:bold;color:#fff;margin:14px 0}

.empty-state{text-align:center;color:var(--muted);padding:50px 20px;font-size:1rem}

@media(max-width:480px){
  .fc-word{font-size:2.6rem}
  .kj-word{font-size:4rem}
  .match-grid{grid-template-columns:repeat(2,1fr)}
  .controls{flex-direction:column;align-items:stretch}
  select{min-width:unset}
  .fc-face{padding:20px}
}
</style>
</head>

<script>
// Load data safely from JSON script tags
var VOCAB = JSON.parse(document.getElementById('vocab-data').textContent);
var KANJI = JSON.parse(document.getElementById('kanji-data').textContent);

// ── STATE ──
var vDeck=[], vIdx=0, vFlipped=false, vRight=0, vWrong=0, vMissed=[];
var kDeck=[], kIdx=0, kFlipped=false, kRight=0, kWrong=0, kMissed=[];
var matchCards=[], matchSel=null, matchSelEl=null, matchMatched=0, matchTotal=0;
var matchLocked=false, matchStartTime=null, matchTimer=null, matchBest={};

// ── UTILITIES ──
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function byLesson(arr,sel){return sel==='all'?arr:arr.filter(function(x){return x.lesson===sel;})}
function fmtTime(ms){var s=Math.floor(ms/1000);var m=Math.floor(s/60);return(m>0?m+'m ':'')+s%60+'s';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── TABS ──
function switchTab(name){
  var names=['vocab','kanji','match'];
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',names[i]===name);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+name).classList.add('active');
}

// ── VOCAB INIT ──
function initVocab(){
  var lesson=document.getElementById('vocab-lesson-filter').value;
  vDeck=shuffle(byLesson(VOCAB,lesson));
  vIdx=0;vFlipped=false;vRight=0;vWrong=0;vMissed=[];
  document.getElementById('vocab-count').textContent=vDeck.length+' cards';
  renderVocab();
}
function shuffleVocab(){vDeck=shuffle(vDeck);vIdx=0;vFlipped=false;renderVocab();}

// ── KANJI INIT ──
function initKanji(){
  var lesson=document.getElementById('kanji-lesson-filter').value;
  kDeck=shuffle(byLesson(KANJI,lesson));
  kIdx=0;kFlipped=false;kRight=0;kWrong=0;kMissed=[];
  document.getElementById('kanji-count').textContent=kDeck.length+' cards';
  renderKanji();
}
function shuffleKanji(){kDeck=shuffle(kDeck);kIdx=0;kFlipped=false;renderKanji();}

// ── FLIP & MARK ──
function doFlip(type){
  if(type==='vocab'){vFlipped=!vFlipped;renderVocab();}
  else{kFlipped=!kFlipped;renderKanji();}
}
function markCard(type,correct){
  if(type==='vocab'){
    if(correct)vRight++;else{vWrong++;vMissed.push(vDeck[vIdx]);}
    vIdx++;vFlipped=false;renderVocab();
  }else{
    if(correct)kRight++;else{kWrong++;kMissed.push(kDeck[kIdx]);}
    kIdx++;kFlipped=false;renderKanji();
  }
}
function skipCard(type){
  if(type==='vocab'){vIdx++;vFlipped=false;renderVocab();}
  else{kIdx++;kFlipped=false;renderKanji();}
}
function prevCard(type){
  if(type==='vocab'&&vIdx>0){vIdx--;vFlipped=false;renderVocab();}
  else if(type==='kanji'&&kIdx>0){kIdx--;kFlipped=false;renderKanji();}
}
function reviewMissed(type){
  if(type==='vocab'){
    vDeck=shuffle(vMissed.slice());vIdx=0;vFlipped=false;vRight=0;vWrong=0;vMissed=[];renderVocab();
  }else{
    kDeck=shuffle(kMissed.slice());kIdx=0;kFlipped=false;kRight=0;kWrong=0;kMissed=[];renderKanji();
  }
}

// ── RENDER VOCAB ──
function renderVocab(){
  var el=document.getElementById('vocab-fc-area');
  if(!el)return;
  if(vDeck.length===0){el.innerHTML='<div class="empty-state">No cards for this selection.</div>';return;}
  if(vIdx>=vDeck.length){renderSummary(el,'vocab',vRight,vWrong,vDeck,vMissed);return;}
  var c=vDeck[vIdx];
  var mode=document.getElementById('vocab-mode').value;
  var pct=Math.round((vIdx/vDeck.length)*100);
  var front,back;
  if(mode==='jpEn'){
    front='<div class="fc-word">'+esc(c.w)+'</div>'+(c.kana!==c.w?'<div class="fc-kana">'+esc(c.kana)+'</div>':'')+'<div class="fc-romaji">'+esc(c.romaji)+'</div><div class="fc-pos">'+esc(c.pos)+'</div><div class="fc-hint">Tap to reveal English</div>';
    back='<div class="fc-meaning">'+esc(c.en)+'</div><div class="fc-word" style="font-size:1.8rem">'+esc(c.w)+'</div><div class="fc-lesson">'+esc(c.lesson)+'</div>';
  }else if(mode==='enJp'){
    front='<div class="fc-meaning">'+esc(c.en)+'</div><div class="fc-pos">'+esc(c.pos)+'</div><div class="fc-hint">Tap to reveal Japanese</div>';
    back='<div class="fc-word">'+esc(c.w)+'</div><div class="fc-kana">'+esc(c.kana)+'</div><div class="fc-romaji">'+esc(c.romaji)+'</div><div class="fc-lesson">'+esc(c.lesson)+'</div>';
  }else{
    front='<div class="fc-word" style="font-size:2.2rem">'+esc(c.kana)+'</div><div class="fc-romaji">'+esc(c.romaji)+'</div><div class="fc-hint">Tap to reveal kanji + meaning</div>';
    back='<div class="fc-word">'+esc(c.w)+'</div><div class="fc-meaning">'+esc(c.en)+'</div><div class="fc-lesson">'+esc(c.lesson)+'</div>';
  }
  renderCard(el,'vocab',pct,vIdx,vDeck.length,vRight,vWrong,vFlipped,front,back);
}

// ── RENDER KANJI ──
function renderKanji(){
  var el=document.getElementById('kanji-fc-area');
  if(!el)return;
  if(kDeck.length===0){el.innerHTML='<div class="empty-state">No cards for this selection.</div>';return;}
  if(kIdx>=kDeck.length){renderSummary(el,'kanji',kRight,kWrong,kDeck,kMissed);return;}
  var c=kDeck[kIdx];
  var mode=document.getElementById('kanji-mode').value;
  var pct=Math.round((kIdx/kDeck.length)*100);
  var front,back;
  if(mode==='kjMeaning'){
    front='<div class="kj-word">'+esc(c.k)+'</div><div class="kj-stroke">'+c.s+' strokes</div><div class="fc-hint" style="margin-top:18px">Tap to reveal meaning</div>';
    back='<div class="kj-meaning">'+esc(c.m)+'</div><div class="kj-on">ON: '+esc(c.on)+'</div><div class="kj-kun">kun: '+esc(c.kun)+'</div><div class="fc-lesson">'+esc(c.lesson)+'</div>';
  }else{
    front='<div class="kj-meaning">'+esc(c.m)+'</div><div class="fc-hint">Tap to reveal kanji</div>';
    back='<div class="kj-word">'+esc(c.k)+'</div><div class="kj-on">ON: '+esc(c.on)+'</div><div class="kj-kun">kun: '+esc(c.kun)+'</div><div class="kj-stroke">'+c.s+' strokes</div>';
  }
  renderCard(el,'kanji',pct,kIdx,kDeck.length,kRight,kWrong,kFlipped,front,back);
}

// ── SHARED CARD RENDERER ──
function renderCard(el,type,pct,idx,total,right,wrong,flipped,front,back){
  el.innerHTML=
    '<div class="progress-bar-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div>'+
    '<div class="progress-text">'+(idx+1)+' / '+total+' &nbsp;&#183;&nbsp; &#10003; '+right+' &nbsp;&#183;&nbsp; &#10007; '+wrong+'</div>'+
    '<div class="flip-wrap" id="fc-flipwrap">'+
      '<div class="flip-card'+(flipped?' flipped':'')+'">'+
        '<div class="fc-face fc-front">'+front+'</div>'+
        '<div class="fc-face fc-back">'+back+'</div>'+
      '</div>'+
    '</div>'+
    (flipped
      ?'<div class="fc-actions"><button class="btn-wrong" id="fc-wrong">&#10007; Again</button><button class="btn-right" id="fc-right">&#10003; Got it</button></div>'
      :'<div class="fc-actions"><button class="btn btn-outline" id="fc-reveal">Reveal &#8594;</button></div>'
    )+
    '<div class="fc-nav">'+
      (idx>0?'<button class="btn btn-outline" id="fc-prev">&#8592; Prev</button>':'')+
      '<button class="btn btn-outline" id="fc-skip">Skip &#8594;</button>'+
    '</div>';
  // Wire up events (no inline onclick needed)
  var fw=document.getElementById('fc-flipwrap'); if(fw) fw.addEventListener('click',function(){doFlip(type);});
  var wr=document.getElementById('fc-wrong');    if(wr) wr.addEventListener('click',function(){markCard(type,false);});
  var ri=document.getElementById('fc-right');    if(ri) ri.addEventListener('click',function(){markCard(type,true);});
  var rv=document.getElementById('fc-reveal');   if(rv) rv.addEventListener('click',function(){doFlip(type);});
  var pr=document.getElementById('fc-prev');     if(pr) pr.addEventListener('click',function(){prevCard(type);});
  var sk=document.getElementById('fc-skip');     if(sk) sk.addEventListener('click',function(){skipCard(type);});
}

// ── SUMMARY ──
function renderSummary(el,type,right,wrong,deck,missed){
  var pct=deck.length>0?Math.round((right/deck.length)*100):0;
  var emoji=pct>=90?'&#127942;':pct>=70?'&#127881;':pct>=50?'&#128077;':'&#128218;';
  var wrongHTML='';
  if(missed.length>0){
    wrongHTML='<div class="wrong-list"><div style="font-size:.85rem;color:var(--muted);margin-bottom:6px;">Cards to review:</div>'+
      missed.map(function(c){return'<div class="wrong-item"><span class="wrong-jp">'+(type==='kanji'?esc(c.k):esc(c.w))+'</span><span class="wrong-en">'+(type==='kanji'?esc(c.m):esc(c.en))+'</span></div>';}).join('')+
    '</div>';
  }
  el.innerHTML=
    '<div class="summary">'+
      '<div class="score-ring">'+emoji+'</div>'+
      '<h2>'+pct+'% Correct</h2>'+
      '<div class="score-stats">'+
        '<div class="stat-box"><div class="stat-num" style="color:#7de89a">'+right+'</div><div class="stat-lbl">Correct</div></div>'+
        '<div class="stat-box"><div class="stat-num" style="color:#ff8080">'+wrong+'</div><div class="stat-lbl">Missed</div></div>'+
        '<div class="stat-box"><div class="stat-num">'+deck.length+'</div><div class="stat-lbl">Total</div></div>'+
      '</div>'+
      wrongHTML+
      '<div style="display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap">'+
        '<button class="btn btn-gold" id="sum-restart">&#8635; Restart</button>'+
        (missed.length>0?'<button class="btn btn-outline" id="sum-review">&#128218; Review Missed</button>':'')+
      '</div>'+
    '</div>';
  // Wire summary buttons
  var sr=document.getElementById('sum-restart');
  if(sr) sr.addEventListener('click', type==='vocab' ? initVocab : initKanji);
  var sv=document.getElementById('sum-review');
  if(sv) sv.addEventListener('click', function(){reviewMissed(type);});
}

// ── MATCHING GAME ──
function startMatch(){
  var lesson=document.getElementById('match-lesson-filter').value;
  var size=parseInt(document.getElementById('match-size').value);
  var type=document.getElementById('match-type').value;
  var pool=shuffle(byLesson(VOCAB,lesson));
  if(type==='kanaJp')pool=pool.filter(function(v){return v.w!==v.kana&&/[\u4e00-\u9fff]/.test(v.w);});
  pool=pool.slice(0,size);
  if(pool.length<4){document.getElementById('match-area').innerHTML='<div class="empty-state">Not enough cards. Try All Lessons.</div>';return;}
  matchTotal=pool.length;matchMatched=0;matchSel=null;matchSelEl=null;matchLocked=false;
  var pairs=[];
  pool.forEach(function(v,i){
    var L,R;
    if(type==='kanaJp'){
      L={id:i,pair:i,text:v.kana,sub:v.romaji,side:'L'};
      R={id:i+size,pair:i,text:v.w,sub:v.en,side:'R'};
    }else{
      L={id:i,pair:i,text:v.w,sub:v.kana,side:'L'};
      R={id:i+size,pair:i,text:v.en,sub:'',side:'R'};
    }
    pairs.push(L,R);
  });
  matchCards=shuffle(pairs);
  if(matchTimer)clearInterval(matchTimer);
  matchStartTime=Date.now();
  var key=lesson+'_'+size+'_'+type;
  var bestHTML=matchBest[key]?'<div style="color:var(--gold);font-size:.82rem">Best: '+fmtTime(matchBest[key])+'</div>':'';
  document.getElementById('match-area').innerHTML=
    '<div class="match-header"><div class="timer" id="m-timer">0s</div><div class="match-score" id="m-score">0 / '+matchTotal+' matched</div>'+bestHTML+'</div>'+
    '<div class="match-grid">'+
      matchCards.map(function(c){
        var isJp=c.side==='L'&&type==='jpEn'||c.side==='L'&&type==='kanaJp';
        return '<div class="match-card" id="mc-'+c.id+'" data-id="'+c.id+'" data-pair="'+c.pair+'" data-side="'+c.side+'">'+
          '<div class="'+(isJp?'jp':'en')+'">'+esc(c.text)+'</div>'+
          (c.sub?'<div class="en">'+esc(c.sub)+'</div>':'')+
          '</div>'
      }).join('')+
    '</div>';
  var grid2=document.getElementById('match-grid-inner');
  if(grid2) grid2.addEventListener('click',function(e){var card=e.target.closest('.match-card');if(card) selMatch(parseInt(card.dataset.id),parseInt(card.dataset.pair),card.dataset.side);});
  matchTimer=setInterval(function(){var el=document.getElementById('m-timer');if(el)el.textContent=fmtTime(Date.now()-matchStartTime);},500);
}

function selMatch(id,pair,side){
  if(matchLocked)return;
  var el=document.getElementById('mc-'+id);
  if(!el||el.classList.contains('matched'))return;
  if(!matchSel){
    matchSel={id:id,pair:pair,side:side};matchSelEl=el;el.classList.add('selected');
    return;
  }
  if(matchSel.id===id){el.classList.remove('selected');matchSel=null;matchSelEl=null;return;}
  var hit=matchSel.pair===pair&&matchSel.side!==side;
  if(hit){
    el.classList.add('matched');matchSelEl.classList.remove('selected');matchSelEl.classList.add('matched');
    matchSel=null;matchSelEl=null;matchMatched++;
    var sc=document.getElementById('m-score');if(sc)sc.textContent=matchMatched+' / '+matchTotal+' matched';
    if(matchMatched===matchTotal){
      clearInterval(matchTimer);
      var elapsed=Date.now()-matchStartTime;
      var key=document.getElementById('match-lesson-filter').value+'_'+document.getElementById('match-size').value+'_'+document.getElementById('match-type').value;
      var isNew=!matchBest[key]||elapsed<matchBest[key];
      if(isNew)matchBest[key]=elapsed;
      setTimeout(function(){
        document.getElementById('match-area').innerHTML=
          '<div class="match-complete">'+
            '<h2>&#127881; Complete!</h2>'+
            '<div class="big-time">'+fmtTime(elapsed)+'</div>'+
            (isNew?'<div style="color:var(--gold)">&#11088; New best time!</div>':'<div style="color:var(--muted)">Best: '+fmtTime(matchBest[key])+'</div>')+
            '<div style="display:flex;gap:10px;justify-content:center;margin-top:20px">'+
              '<button class="btn btn-gold" onclick="startMatch()">&#9654; Play Again</button>'+
            '</div>'+
          '</div>';
      },400);
    }
  }else{
    matchLocked=true;
    el.classList.add('wrong');matchSelEl.classList.add('wrong');
    var prev=matchSelEl,prevEl=el;
    setTimeout(function(){
      prevEl.classList.remove('wrong','selected');
      prev.classList.remove('wrong','selected');
      matchSel=null;matchSelEl=null;matchLocked=false;
    },600);
  }
}
</script>
</body>
</html>
